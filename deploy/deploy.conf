# ============================================================
# Toolio – Deploy-Konfiguration
# Diese Datei liegt auf dem VPS unter /opt/toolio/deploy/
# ============================================================

# Name des Docker-Containers, in dem Moodle läuft
CONTAINER_NAME=moodle-dev-server

# Moodle-Root im Container (wo admin/cli/ liegt)
MOODLE_ROOT=/var/www/moodle

# Pfad zu den Plugin-Verzeichnissen im Docker-Volume (auf dem VPS-Host)
VOLUME_PATH=/var/lib/docker/volumes/moodle_moodle_core/_data/public
